name: Multi-Platform CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cxx: g++
            cc: gcc
            exe: ./orbit
          - os: ubuntu-latest
            compiler: clang
            cxx: clang++
            cc: clang
            exe: ./orbit
          - os: macos-latest
            compiler: gcc
            cxx: g++
            cc: gcc
            exe: ./orbit
          - os: macos-latest
            compiler: clang
            cxx: clang++
            cc: clang
            exe: ./orbit
          - os: windows-latest
            compiler: gcc
            cxx: g++
            cc: gcc
            exe: ./orbit.exe
          - os: windows-latest
            compiler: clang
            cxx: clang++
            cc: clang
            exe: ./orbit.exe
          - os: windows-latest
            compiler: clang-cl
            cxx: clang-cl
            cc: clang-cl
            exe: ./orbit.exe
          - os: windows-latest
            compiler: msvc
            cxx: cl
            cc: cl
            exe: ./orbit.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC (Linux)
        if: matrix.compiler == 'gcc' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y g++ gcc

      - name: Install Clang (Linux)
        if: matrix.compiler == 'clang' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y clang++ clang

      - name: Install GCC (macOS)
        if: matrix.compiler == 'gcc' && matrix.os == 'macos-latest'
        run: brew install gcc

      - name: Install Clang (macOS)
        if: matrix.compiler == 'clang' && matrix.os == 'macos-latest'
        run: clang++ --version

      - name: Install LLVM (Windows Clang-Cl)
        if: matrix.compiler == 'clang-cl'
        run: |
          winget install LLVM.LLVM --silent --accept-source-agreements --accept-package-agreements
          refreshenv

      - name: Compile
        run: ${{ matrix.cxx }} -o ${{ matrix.exe }} orbit.cpp -std=c++23

      - name: Test
        run: ${{ matrix.exe }} --help
